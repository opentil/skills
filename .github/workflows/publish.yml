name: Publish @opentil packages

on:
  push:
    tags: ['cli/v*', 'mcp/v*']

jobs:
  publish-cli:
    if: startsWith(github.ref, 'refs/tags/cli/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Build and publish CLI
        run: cd cli && npm ci && npm run build && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    if: startsWith(github.ref, 'refs/tags/mcp/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Build and publish MCP
        run: cd mcp && npm ci && npm run build && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
